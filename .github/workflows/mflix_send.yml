name: Send Movie File (Final Fix)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'වීඩියෝ එකේ ID එක (GDrive හෝ VOE)'
        required: true
        default: '16WlbtOM4waRMqpDa34mQpyYFKdthqASf'
      user_jid:
        description: 'ඔයාගේ WhatsApp Number එක'
        required: true
        default: '94766886046@s.whatsapp.net'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests
          npm install @whiskeysockets/baileys pino axios

      - name: Run Script
        env:
          VOE_KEY: ${{ secrets.VOE_KEY }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          FILE_ID: ${{ github.event.inputs.file_id }}
          USER_JID: ${{ github.event.inputs.user_jid }}
        run: |
          # Python Downloader with GDrive Bypass
          cat <<'EOF' > downloader.py
          import os, requests, sys

          def get_confirm_token(response):
              for key, value in response.cookies.items():
                  if key.startswith('download_warning'):
                      return value
              return None

          def download_file_from_google_drive(id, destination):
              URL = "https://docs.google.com/uc?export=download"
              session = requests.Session()
              response = session.get(URL, params={'id': id}, stream=True)
              token = get_confirm_token(response)

              if token:
                  params = {'id': id, 'confirm': token}
                  response = session.get(URL, params=params, stream=True)
              
              save_response_content(response, destination)

          def save_response_content(response, destination):
              CHUNK_SIZE = 32768
              with open(destination, "wb") as f:
                  for chunk in response.iter_content(CHUNK_SIZE):
                      if chunk: f.write(chunk)

          file_id = os.getenv('FILE_ID')
          voe_key = os.getenv('VOE_KEY')
          
          print(f"Starting download for ID: {file_id}")
          
          try:
              if len(file_id) > 20: # GDrive ID detect
                  download_file_from_google_drive(file_id, 'movie_mflix.mp4')
              else: # VOE ID detect
                  api_url = f"https://voe.sx/api/drive/v2/file/info?key={voe_key}&file_code={file_id}"
                  r = requests.get(api_url).json()
                  direct_url = r.get('result', {}).get('direct_url')
                  if direct_url:
                      r_file = requests.get(direct_url, stream=True)
                      save_response_content(r_file, 'movie_mflix.mp4')
                  else:
                      print("Error: Could not get VOE direct link")
                      sys.exit(1)

              size = os.path.getsize('movie_mflix.mp4')
              print(f"Download Complete! File Size: {size / (1024*1024):.2f} MB")
              
              if size < 100000:
                  print("Error: File is too small. Check permissions or link.")
                  sys.exit(1)
          except Exception as e:
              print(f"Critical Error: {e}")
              sys.exit(1)
          EOF
          
          python3 downloader.py
          node send.js
